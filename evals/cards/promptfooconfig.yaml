description: llog card generation evals

prompts:
  - id: card-prompt
    raw: card eval prompt

providers:
  - id: file://provider.cjs
    label: llog card generator

tests:
  - description: generate separation anxiety stats
    vars:
      mode: generate
      fixturePath: evals/cards/fixtures/separation-anxiety-sessions.json
      promptPath: evals/cards/prompts/duration-progress.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:separationAnxiety

  - description: planned separation anxiety stats
    vars:
      mode: planned
      fixturePath: evals/cards/fixtures/separation-anxiety-sessions.json
      promptPath: evals/cards/prompts/duration-progress.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:separationAnxiety

  - description: refresh separation anxiety stats
    vars:
      mode: refresh
      fixturePath: evals/cards/fixtures/separation-anxiety-sessions.json
      promptPath: evals/cards/prompts/duration-progress.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:refreshSeparationAnxiety

  - description: generate copied card from blueprint
    vars:
      mode: blueprint
      fixturePath: evals/cards/fixtures/sleep-blueprint.json
      promptPath: evals/cards/prompts/sleep-blueprint.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:blueprint

  - description: generate date handling card
    vars:
      mode: generate
      fixturePath: evals/cards/fixtures/date-handling.json
      promptPath: evals/cards/prompts/date-handling.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:dateHandling

  - description: generate nested source card
    vars:
      mode: generate
      fixturePath: evals/cards/fixtures/nested-sources.json
      promptPath: evals/cards/prompts/nested-sources.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:nestedSources

  - description: generate exact small cached counts
    vars:
      mode: exact
      fixturePath: evals/cards/fixtures/exact-small-counts.json
      promptPath: evals/cards/prompts/exact-small-counts.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: generate exact large cached counts
    vars:
      mode: exact
      fixturePath: evals/cards/fixtures/exact-large-counts.json
      promptPath: evals/cards/prompts/exact-large-counts.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: generate exact last 3 months duration
    vars:
      mode: exact
      fixturePath: evals/cards/fixtures/date-window-last-3-months.json
      promptPath: evals/cards/prompts/exact-last-3-months-duration.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: planned exact Feb Apr duration
    vars:
      mode: planned
      fixturePath: evals/cards/fixtures/date-window-feb-apr.json
      promptPath: evals/cards/prompts/exact-feb-apr-duration.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: planned exact distress threshold streak
    vars:
      mode: planned
      fixturePath: evals/cards/fixtures/exact-distress-streak.json
      promptPath: evals/cards/prompts/exact-distress-streak.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: generate exact distress threshold days since
    vars:
      mode: exact
      fixturePath: evals/cards/fixtures/exact-distress-days-since.json
      promptPath: evals/cards/prompts/exact-distress-days-since.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: tweak exact metric label override
    vars:
      mode: tweak
      fixturePath: evals/cards/fixtures/exact-distress-streak-label-tweak.json
      promptPath: evals/cards/prompts/exact-distress-streak.txt
      tweakPromptPath: evals/cards/prompts/exact-label-override-tweak.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:exactCounts

  - description: tweak trigger resilience
    vars:
      mode: tweak
      fixturePath: evals/cards/fixtures/separation-anxiety-sessions.json
      promptPath: evals/cards/prompts/duration-progress.txt
      tweakPromptPath: evals/cards/prompts/trigger-resilience-tweak.txt
    assert:
      - type: javascript
        value: file://assertions/index.cjs:cardOutput
      - type: javascript
        value: file://assertions/index.cjs:triggerTweak

commandLineOptions:
  maxConcurrency: 4
